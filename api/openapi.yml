openapi: "3.0.3"

info:
  title: "holos: ストレージAPI"
  version: ""

servers:
  - url: "http://localhost:8002"
    description: "localhost"
  - url: "http://storage-api:8000"
    description: "docker compose service"

paths:
  /health:
    get:
      summary: "ヘルスチェック"
      tags:
        - "health"
      responses:
        204:
          $ref: "#/components/responses/no_content"
  /volumes:
    post:
      summary: "ボリューム作成"
      tags:
        - "volumes"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
      requestBody:
        $ref: "#/components/requestBodies/create_volume"
      responses:
        201:
          $ref: "#/components/responses/create_volume"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        409:
          $ref: "#/components/responses/duplicate"
        422:
          $ref: "#/components/responses/invalid_input"
        500:
          $ref: "#/components/responses/internal_server_error"
    get:
      summary: "ボリューム一覧取得"
      tags:
        - "volumes"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
      responses:
        200:
          $ref: "#/components/responses/get_volumes"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        500:
          $ref: "#/components/responses/internal_server_error"
  /volumes/{name}:
    put:
      summary: "ボリューム更新"
      tags:
        - "volumes"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "name"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
      requestBody:
        $ref: "#/components/requestBodies/update_volume"
      responses:
        200:
          $ref: "#/components/responses/update_volume"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        404:
          $ref: "#/components/responses/not_found"
        409:
          $ref: "#/components/responses/duplicate"
        422:
          $ref: "#/components/responses/invalid_input"
        500:
          $ref: "#/components/responses/internal_server_error"
    delete:
      summary: "ボリューム削除"
      tags:
        - "volumes"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "name"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
      responses:
        204:
          $ref: "#/components/responses/no_content"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        409:
          $ref: "#/components/responses/constraint_violation"
        500:
          $ref: "#/components/responses/internal_server_error"
    get:
      summary: "ボリューム単体取得"
      tags:
        - "volumes"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "name"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
      responses:
        200:
          $ref: "#/components/responses/get_volume"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        404:
          $ref: "#/components/responses/not_found"
        500:
          $ref: "#/components/responses/internal_server_error"
  /entries/{volumeName}:
    post:
      summary: "エントリー作成"
      tags:
        - "entries"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "volumeName"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
      requestBody:
        $ref: "#/components/requestBodies/create_entry"
      responses:
        201:
          $ref: "#/components/responses/create_entry"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        409:
          $ref: "#/components/responses/duplicate"
        422:
          $ref: "#/components/responses/constraint_violation"
        500:
          $ref: "#/components/responses/internal_server_error"
    get:
      summary: "エントリー一覧取得"
      tags:
        - "entries"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "volumeName"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
        - in: "query"
          name: "prefix"
          schema:
            type: "string"
          description: "Keyで前方一致検索する際のprefix"
          example: "folder"
        - in: "query"
          name: "depth"
          schema:
            type: "integer"
          description: "Keyで前方一致検索する際に取得する階層の範囲"
          example: 1
      responses:
        200:
          $ref: "#/components/responses/get_entries"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        500:
          $ref: "#/components/responses/internal_server_error"
  /entries/{volumeName}/{key}:
    post:
      summary: "エントリーコピー"
      tags:
        - "entries"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "volumeName"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
        - in: "path"
          name: "key"
          schema:
            type: "string"
          required: true
          description: "キー"
          example: "key/sample.txt"
      responses:
        201:
          $ref: "#/components/responses/copy_entry"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        404:
          $ref: "#/components/responses/not_found"
        422:
          $ref: "#/components/responses/invalid_input"
        500:
          $ref: "#/components/responses/internal_server_error"
    put:
      summary: "エントリー更新"
      tags:
        - "entries"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "volumeName"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
        - in: "path"
          name: "key"
          schema:
            type: "string"
          required: true
          description: "キー"
          example: "key/sample.txt"
      requestBody:
        $ref: "#/components/requestBodies/update_entry"
      responses:
        200:
          $ref: "#/components/responses/update_entry"
        400:
          $ref: "#/components/responses/bad_request"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        404:
          $ref: "#/components/responses/not_found"
        409:
          $ref: "#/components/responses/duplicate"
        500:
          $ref: "#/components/responses/internal_server_error"
    delete:
      summary: "エントリー削除"
      tags:
        - "entries"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          required: true
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "volumeName"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
        - in: "path"
          name: "key"
          schema:
            type: "string"
          required: true
          description: "キー"
          example: "key/sample.txt"
      responses:
        204:
          $ref: "#/components/responses/no_content"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        500:
          $ref: "#/components/responses/internal_server_error"
    head:
      summary: "エントリー情報取得"
      tags:
        - "entries"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "volumeName"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
        - in: "path"
          name: "key"
          schema:
            type: "string"
          required: true
          description: "キー"
          example: "key/sample.txt"
      responses:
        200:
          description: "Success"
          headers:
            Content-Length:
              schema:
                type: "integer"
                example: 4
            Content-Type:
              schema:
                type: "string"
                example: "text/plain; charset=utf-8"
            Last-Modified:
              schema:
                type: "string"
                example: "Wed, 07 May 2025 17:22:51 GMT"
            Holos-Entry-Type:
              schema:
                type: "string"
                example: "text/plain; charset=utf-8"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        404:
          $ref: "#/components/responses/not_found"
        500:
          $ref: "#/components/responses/internal_server_error"
    get:
      summary: "エントリー単体取得"
      tags:
        - "entries"
      security:
        - sessionAuth: []
        - accessKeyAuth: []
      parameters:
        - in: "header"
          name: "Authorization"
          schema:
            type: "string"
          description: "セッショントークンまたはアクセスキー"
          example: "Session 1Ty1HKTPKTt8xEi-_3HTbWf2SCHOdqOS"
        - in: "path"
          name: "volumeName"
          schema:
            type: "string"
          required: true
          description: "ボリューム名"
          example: "volume_name"
        - in: "path"
          name: "key"
          schema:
            type: "string"
          required: true
          description: "キー"
          example: "key/sample.txt"
      responses:
        200:
          $ref: "#/components/responses/get_entry"
        401:
          $ref: "#/components/responses/unauthenticated"
        403:
          $ref: "#/components/responses/unauthorized"
        404:
          $ref: "#/components/responses/not_found"
        500:
          $ref: "#/components/responses/internal_server_error"

components:
  securitySchemes:
    sessionAuth:
      type: http
      scheme: Session
    accessKeyAuth:
      type: http
      scheme: AccessKey

  schemas:
    created_at:
      type: "string"
      description: "作成日時"
      format: "date-time"
      example: "2017-07-21T17:32:28Z"
      readOnly: true
    updated_at:
      type: "string"
      description: "更新日時"
      format: "date-time"
      example: "2017-07-21T17:32:28Z"
      readOnly: true
    volume:
      type: "object"
      properties:
        name:
          type: "string"
          description: "ボリューム名"
          example: "volume_name"
        is_public:
          type: "boolean"
          description: "公開フラグ"
          example: false
        created_at:
          $ref: "#/components/schemas/created_at"
        updated_at:
          $ref: "#/components/schemas/updated_at"
      required:
        - "name"
        - "is_public"
        - "created_at"
        - "updated_at"
    entry:
      type: "object"
      properties:
        volume_name:
          type: "string"
          description: "ボリューム名"
          example: "volume_name"
          writeOnly: true
        key:
          type: "string"
          description: "キー"
          example: "key/sample.txt"
        size:
          type: "number"
          description: "サイズ"
          example: 4
          readOnly: true
        type:
          type: "string"
          description: "タイプ"
          example: "text/plain; charset=utf-8"
          readOnly: true
        created_at:
          $ref: "#/components/schemas/created_at"
        updated_at:
          $ref: "#/components/schemas/updated_at"
      required:
        - "volume_name"
        - "key"
        - "size"
        - "type"
        - "created_at"
        - "updated_at"

  requestBodies:
    create_volume:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/volume"
    update_volume:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/volume"
    create_entry:
      required: true
      content:
        multipart/form-data:
          schema:
            allOf:
              - $ref: "#/components/schemas/entry"
              - type: "object"
                properties:
                  volume_name:
                    readOnly: true
                  file:
                    type: "string"
                    format: "byte"
                    description: "ファイル"
                required:
                  - "file"
    update_entry:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/entry"
              - type: "object"
                properties:
                  volume_name:
                    readOnly: true

  responses:
    create_volume:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/volume"
    update_volume:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/volume"
    get_volume:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/volume"
    get_volumes:
      description: "Success"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              volumes:
                type: "array"
                items:
                  $ref: "#/components/schemas/volume"
    create_entry:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/entry"
    copy_entry:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/entry"
    update_entry:
      description: "Success"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/entry"
    get_entry:
      description: "Success"
      headers:
        Content-Length:
          schema:
            type: "integer"
            example: 4
        Content-Type:
          schema:
            type: "string"
            example: "text/plain; charset=utf-8"
        Last-Modified:
          schema:
            type: "string"
            example: "Wed, 07 May 2025 17:22:51 GMT"
        Holos-Entry-Type:
          schema:
            type: "string"
            example: "text/plain; charset=utf-8"
      content:
        application/octet-stream:
          schema:
            type: "string"
            format: "byte"
            description: "ファイル"
    get_entries:
      description: "Success"
      content:
        application/json:
          schema:
            type: "object"
            properties:
              entries:
                type: "array"
                items:
                  $ref: "#/components/schemas/entry"
    no_content:
      description: "Success"
    bad_request:
      description: "Bad Request"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "BAD_REQUEST"
                  message:
                    type: "string"
                    example: "bad request"
    unauthenticated:
      description: "Unauthenticated"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "UNAUTHENTICATED"
                  message:
                    type: "string"
                    example: "unauthenticated"
    unauthorized:
      description: "Unauthorized"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "UNAUTHORIZED"
                  message:
                    type: "string"
                    example: "unauthorized"
    not_found:
      description: "Not Found"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "NOT_FOUND"
                  message:
                    type: "string"
                    example: "not found"
    duplicate:
      description: "Duplicate"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "DUPLICATE"
                  message:
                    type: "string"
                    example: "duplicate"
    constraint_violation:
      description: "Constraint Violation"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "CONSTRAINT_VIOLATION"
                  message:
                    type: "string"
                    example: "constraint violation"
    invalid_input:
      description: "Invalid Input"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "INVALID_INPUT"
                  message:
                    type: "string"
                    example: "invalid input"
    internal_server_error:
      description: "Internal Server Error"
      content:
        text/plain:
          schema:
            type: "object"
            properties:
              error:
                type: "object"
                properties:
                  code:
                    type: "string"
                    example: "INTERNAL_SERVER_ERROR"
                  message:
                    type: "string"
                    example: "internal server error"
